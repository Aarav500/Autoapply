name: Check Container Status

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  check:
    name: Check Docker on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check container status via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 60 \
            --parameters commands='[
              "export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
              "echo === Docker Version ===",
              "docker --version || echo Docker not installed",
              "echo === Running Containers ===",
              "docker ps -a 2>/dev/null || echo No containers",
              "echo === Container Logs ===",
              "docker logs autoapply-app --tail 50 2>&1 || echo Container autoapply-app not found",
              "echo === Disk Space ===",
              "df -h /",
              "echo === App Files ===",
              "ls /home/ubuntu/autoapply/app/.next/BUILD_ID 2>/dev/null && echo Build ID exists || echo No app files found",
              "echo === Port 3000 ===",
              "ss -tlnp | grep 3000 || echo Port 3000 not listening"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          sleep 15

          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" \
            --output text
