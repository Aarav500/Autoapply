# GitHub Actions Workflow for Complete AWS Deployment
# Builds app, uploads to S3, deploys to EC2 via SSM

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: autoapply

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NEXT_PUBLIC_CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create Deployment Package
        run: |
          echo "📦 Creating deployment package..."
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp next.config.* deploy-package/ 2>/dev/null || true
          
          # Create .env file
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" > deploy-package/.env
          echo "NEXT_PUBLIC_CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> deploy-package/.env
          echo "NODE_ENV=production" >> deploy-package/.env
          echo "PORT=3000" >> deploy-package/.env
          
          cd deploy-package && zip -r ../deployment.zip .
          echo "✅ Package created"

      - name: Upload to S3
        run: |
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip
          echo "✅ Uploaded to S3"

      - name: Deploy to EC2 via SSM
        run: |
          echo "🚀 Deploying to EC2..."
          
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          S3_BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"
          
          echo "📍 Instance: $INSTANCE_ID"
          
          # Send SSM command with simple array of commands
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy AutoApply" \
            --parameters commands='[
              "#!/bin/bash",
              "set -e",
              "echo Starting deployment...",
              "cd /home/ubuntu",
              "if ! command -v node; then curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs; fi",
              "if ! command -v pm2; then sudo npm install -g pm2; fi",
              "if ! command -v unzip; then sudo apt-get update && sudo apt-get install -y unzip; fi",
              "aws s3 cp s3://'"$S3_BUCKET"'/deployments/latest.zip /home/ubuntu/latest.zip --region '"$REGION"'",
              "rm -rf /home/ubuntu/autoapply",
              "mkdir -p /home/ubuntu/autoapply",
              "unzip -o /home/ubuntu/latest.zip -d /home/ubuntu/autoapply",
              "cd /home/ubuntu/autoapply",
              "npm ci --production --legacy-peer-deps || npm install --production",
              "pm2 delete autoapply || true",
              "pm2 start npm --name autoapply -- start",
              "pm2 save",
              "echo Deployment complete!"
            ]' \
            --timeout-seconds 600 \
            --output text
          
          echo "⏳ Waiting for deployment..."
          sleep 60
          echo "✅ Deployment initiated"

      - name: Get Application URL
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo ""
          echo "========================================"
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "========================================"
          echo "🌐 URL: http://$PUBLIC_IP:3000"
          echo "📍 Instance: $INSTANCE_ID"
          echo "========================================"

      - name: Verify App
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo "Testing http://$PUBLIC_IP:3000..."
          sleep 10
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$PUBLIC_IP:3000" --connect-timeout 15 || echo "000")
          
          if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "304" ]; then
            echo "✅ App is live!"
          else
            echo "⚠️ HTTP $HTTP_CODE - app may still be starting"
          fi
          
          echo "🌐 http://$PUBLIC_IP:3000"
