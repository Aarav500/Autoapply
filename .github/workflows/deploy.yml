# GitHub Actions Workflow for AWS Deployment
# Uses GitHub Secrets for all credentials
# Deploys static assets to S3 and uploads build for EC2

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: autoapply

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NEXT_PUBLIC_CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Static Assets to S3
        run: |
          echo "📦 Deploying static assets to S3..."
          aws s3 sync .next/static s3://${{ secrets.S3_BUCKET_NAME }}/_next/static --delete
          aws s3 sync public s3://${{ secrets.S3_BUCKET_NAME }}/public --delete
          echo "✅ Static assets deployed!"

      - name: Create Deployment Package
        run: |
          echo "📦 Creating deployment package..."
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.* deploy/ 2>/dev/null || true
          cd deploy && zip -r ../deployment.zip . -x "node_modules/*"
          
      - name: Upload Deployment Package to S3
        run: |
          echo "📤 Uploading deployment package..."
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployments/deployment-${{ github.sha }}.zip
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip
          echo "✅ Package uploaded!"

      - name: Output Deployment Info
        run: |
          echo "========================================"
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "========================================"
          echo ""
          echo "📦 Package: s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip"
          echo "🔄 Commit: ${{ github.sha }}"
          echo ""
          echo "📋 To deploy on EC2, SSH in and run:"
          echo "   cd /home/ubuntu"
          echo "   aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip ."
          echo "   unzip -o latest.zip -d app"
          echo "   cd app && npm ci --production"
          echo "   pm2 restart autoapply || pm2 start npm --name autoapply -- start"
          echo "========================================"

  notify:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()
    
    steps:
      - name: Deployment Complete
        run: |
          echo "🎉 AutoApply deployment complete!"
          echo "📅 Deployed at: $(date)"
          echo "🔗 Check your EC2 instance for the running app"
