# GitHub Actions Workflow for AWS Deployment
# Uses GitHub Secrets for all credentials
# Deploys static assets to S3 and uploads build for EC2

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: autoapply

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NEXT_PUBLIC_CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Static Assets to S3
        run: |
          echo "📦 Deploying static assets to S3..."
          aws s3 sync .next/static s3://${{ secrets.S3_BUCKET_NAME }}/_next/static --delete
          aws s3 sync public s3://${{ secrets.S3_BUCKET_NAME }}/public --delete
          echo "✅ Static assets deployed!"

      - name: Create Deployment Package
        run: |
          echo "📦 Creating deployment package..."
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.* deploy/ 2>/dev/null || true
          cd deploy && zip -r ../deployment.zip . -x "node_modules/*"
          
      - name: Upload Deployment Package to S3
        run: |
          echo "📤 Uploading deployment package..."
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployments/deployment-${{ github.sha }}.zip
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip
          echo "✅ Package uploaded!"

      - name: Output Deployment Info
        run: |
          echo "========================================"
          echo "✅ BUILD SUCCESSFUL!"
          echo "========================================"
          echo ""
          echo "📦 Package: s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip"
          echo "🔄 Commit: ${{ github.sha }}"
          echo "========================================"

      - name: Deploy to EC2 via SSM
        run: |
          echo "🚀 Deploying to EC2 via AWS SSM..."
          
          # Get EC2 instance ID by tag name
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=*autoapply*" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "⚠️ No running EC2 instance found with tag 'autoapply'"
            echo "Trying to find any running instance..."
            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
          fi
          
          echo "📍 Target EC2 Instance: $INSTANCE_ID"
          
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "❌ No running EC2 instance found!"
            exit 1
          fi
          
          # Send SSM command to deploy
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu",
              "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip . --region ${{ secrets.AWS_REGION }}",
              "rm -rf app-new && mkdir -p app-new",
              "unzip -o latest.zip -d app-new",
              "cd app-new",
              "npm ci --production --legacy-peer-deps 2>/dev/null || npm install --production",
              "pm2 delete autoapply 2>/dev/null || true",
              "pm2 start npm --name autoapply -- start",
              "pm2 save",
              "echo Deployment complete!"
            ]' \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)
          
          echo "📋 SSM Command ID: $COMMAND_ID"
          echo "⏳ Waiting for deployment to complete..."
          
          # Wait for command to complete
          sleep 30
          
          # Check command status
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          
          echo "📊 Deployment Status: $STATUS"
          
          if [ "$STATUS" == "Success" ]; then
            echo "✅ EC2 deployment successful!"
          elif [ "$STATUS" == "InProgress" ] || [ "$STATUS" == "Pending" ]; then
            echo "⏳ Deployment still in progress - check EC2 for final status"
          else
            echo "⚠️ Deployment may have issues - Status: $STATUS"
          fi

      - name: Get Application URL
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo "========================================"
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "========================================"
          echo ""
          echo "🌐 Application URL: http://$PUBLIC_IP:3000"
          echo "📍 EC2 Instance: $INSTANCE_ID"
          echo "========================================"

  notify:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()
    
    steps:
      - name: Deployment Complete
        run: |
          echo "🎉 AutoApply deployment complete!"
          echo "📅 Deployed at: $(date)"
          echo "🔗 Check your EC2 instance for the running app"
