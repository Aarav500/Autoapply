# GitHub Actions Workflow for Docker Deployment to AWS EC2
# Builds Docker image, uploads to S3, deploys to EC2 via SSM

name: Deploy to AWS (Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: autoapply
  DOCKER_IMAGE: college-essay-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          echo "✅ Docker image built"

      - name: Save Docker Image
        run: |
          echo "📦 Saving Docker image..."
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > docker-image.tar.gz
          ls -lh docker-image.tar.gz
          echo "✅ Image saved"

      - name: Upload Docker Image to S3
        run: |
          echo "☁️ Uploading to S3..."
          aws s3 cp docker-image.tar.gz s3://${{ secrets.S3_BUCKET_NAME }}/deployments/docker-image.tar.gz
          echo "✅ Uploaded to S3"

      - name: Create Deploy Script
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          AWS_REGION_VAL: ${{ secrets.AWS_REGION }}
          CLAUDE_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          cat > deploy-script.sh << SCRIPT_EOF
          #!/bin/bash
          set -e
          echo "=== Starting Docker Deployment ==="

          # Install Docker if not present
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu \$(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            sudo usermod -aG docker ubuntu
            sudo systemctl enable docker
            sudo systemctl start docker
            echo "Docker installed!"
          fi

          # Download Docker image from S3
          echo "Downloading Docker image from S3..."
          aws s3 cp s3://${S3_BUCKET}/deployments/docker-image.tar.gz /home/ubuntu/docker-image.tar.gz --region ${AWS_REGION_VAL}

          # Load Docker image
          echo "Loading Docker image..."
          gunzip -c /home/ubuntu/docker-image.tar.gz | sudo docker load

          # Stop ALL containers using port 3000
          echo "Stopping any containers using port 3000..."
          CONTAINERS_ON_PORT=\$(sudo docker ps -q --filter "publish=3000" 2>/dev/null || true)
          if [ -n "\$CONTAINERS_ON_PORT" ]; then
            echo "Found containers on port 3000: \$CONTAINERS_ON_PORT"
            sudo docker stop \$CONTAINERS_ON_PORT || true
            sudo docker rm \$CONTAINERS_ON_PORT || true
          fi

          # Also stop container by name if it exists
          echo "Stopping autoapply container if exists..."
          sudo docker stop autoapply 2>/dev/null || true
          sudo docker rm autoapply 2>/dev/null || true

          # Kill any non-docker process on port 3000 (e.g. PM2/node)
          echo "Checking for any process on port 3000..."
          PID_ON_PORT=\$(sudo lsof -t -i:3000 2>/dev/null || true)
          if [ -n "\$PID_ON_PORT" ]; then
            echo "Killing process \$PID_ON_PORT on port 3000"
            sudo kill -9 \$PID_ON_PORT || true
          fi

          # Wait a moment for port to be released
          sleep 2

          # Run new container
          echo "Starting new container..."
          sudo docker run -d \
            --name autoapply \
            --restart unless-stopped \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e CLAUDE_API_KEY="${CLAUDE_KEY}" \
            -e NEXT_PUBLIC_CLAUDE_API_KEY="${CLAUDE_KEY}" \
            -e AWS_REGION="${AWS_REGION_VAL}" \
            -e S3_BUCKET_NAME="${S3_BUCKET}" \
            college-essay-app:latest

          # Cleanup
          rm -f /home/ubuntu/docker-image.tar.gz

          # Verify
          echo "Waiting for app to start..."
          sleep 10
          sudo docker ps
          echo "=== Deployment Complete ==="
          SCRIPT_EOF

          echo "Deploy script created"

      - name: Upload Deploy Script to S3
        run: |
          aws s3 cp deploy-script.sh s3://${{ secrets.S3_BUCKET_NAME }}/deployments/deploy-script.sh
          echo "✅ Deploy script uploaded"

      - name: Deploy to EC2 via SSM
        run: |
          echo "🚀 Deploying to EC2..."
          
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          S3_BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"
          
          echo "📍 Instance: $INSTANCE_ID"
          
          # Send SSM command to download and run script
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy AutoApply Docker" \
            --parameters 'commands=["aws s3 cp s3://'"$S3_BUCKET"'/deployments/deploy-script.sh /home/ubuntu/deploy-script.sh --region '"$REGION"'","chmod +x /home/ubuntu/deploy-script.sh","bash /home/ubuntu/deploy-script.sh"]' \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)
          
          echo "📋 Command ID: $COMMAND_ID"
          echo "⏳ Waiting for deployment to complete..."
          
          # Wait for command to complete
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            
            echo "Status: $STATUS"
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment succeeded!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Deployment failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            
            sleep 10
          done

      - name: Get Application URL
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo ""
          echo "========================================"
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "========================================"
          echo "🐳 Docker Container: autoapply"
          echo "🌐 URL: http://$PUBLIC_IP:3000"
          echo "📍 Instance: $INSTANCE_ID"
          echo "========================================"

      - name: Verify Application
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo "Testing http://$PUBLIC_IP:3000..."
          sleep 15
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$PUBLIC_IP:3000" --connect-timeout 30 || echo "000")
          
          if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "304" ]; then
            echo "✅ App is live and responding!"
          else
            echo "⚠️ HTTP $HTTP_CODE - app may still be starting"
            echo "Check container logs: ssh to EC2 and run 'docker logs autoapply'"
          fi
          
          echo ""
          echo "🌐 http://$PUBLIC_IP:3000"
