# GitHub Actions Workflow for Complete AWS Deployment
# Builds app, uploads to S3, deploys to EC2 via SSM with full environment setup

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: autoapply

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NEXT_PUBLIC_CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create Complete Deployment Package
        run: |
          echo "📦 Creating complete deployment package..."
          mkdir -p deploy-package
          
          # Copy all necessary files
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp next.config.* deploy-package/ 2>/dev/null || true
          
          # Create .env file with all secrets
          cat > deploy-package/.env << EOF
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          NEXT_PUBLIC_CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          NODE_ENV=production
          PORT=3000
          EOF
          
          # Create startup script
          cat > deploy-package/start.sh << 'STARTSCRIPT'
          #!/bin/bash
          set -e
          cd /home/ubuntu/autoapply
          
          # Load environment
          export $(cat .env | xargs)
          
          # Start with PM2
          pm2 delete autoapply 2>/dev/null || true
          pm2 start npm --name autoapply -- start
          pm2 save
          
          echo "Application started on port 3000"
          STARTSCRIPT
          
          chmod +x deploy-package/start.sh
          
          # Zip everything
          cd deploy-package && zip -r ../deployment.zip .
          echo "✅ Deployment package created with $(ls -la ../deployment.zip | awk '{print $5}') bytes"

      - name: Upload to S3
        run: |
          echo "📤 Uploading to S3..."
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployments/latest.zip
          echo "✅ Upload complete!"

      - name: Deploy to EC2 via SSM
        run: |
          echo "🚀 Deploying to EC2..."
          
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          S3_BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          
          echo "📍 Instance: $INSTANCE_ID"
          echo "📦 S3 Bucket: $S3_BUCKET"
          
          # Full deployment script
          DEPLOY_SCRIPT=$(cat << 'ENDSCRIPT'
          #!/bin/bash
          set -e
          
          echo "=== Starting Deployment ==="
          cd /home/ubuntu
          
          # Install Node.js if not present
          if ! command -v node &> /dev/null; then
              echo "Installing Node.js 20..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
          fi
          
          # Install PM2 if not present
          if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2..."
              sudo npm install -g pm2
          fi
          
          # Install unzip if not present
          if ! command -v unzip &> /dev/null; then
              echo "Installing unzip..."
              sudo apt-get update && sudo apt-get install -y unzip
          fi
          
          # Install AWS CLI if not present
          if ! command -v aws &> /dev/null; then
              echo "Installing AWS CLI..."
              sudo apt-get install -y awscli
          fi
          
          # Download and extract deployment
          echo "Downloading deployment package..."
          aws s3 cp s3://S3_BUCKET_PLACEHOLDER/deployments/latest.zip /home/ubuntu/latest.zip --region AWS_REGION_PLACEHOLDER
          
          # Clean and extract
          rm -rf /home/ubuntu/autoapply
          mkdir -p /home/ubuntu/autoapply
          unzip -o /home/ubuntu/latest.zip -d /home/ubuntu/autoapply
          
          # Install production dependencies
          cd /home/ubuntu/autoapply
          echo "Installing dependencies..."
          npm ci --production --legacy-peer-deps 2>/dev/null || npm install --production --legacy-peer-deps
          
          # Set permissions
          chmod +x start.sh 2>/dev/null || true
          
          # Stop existing app
          pm2 delete autoapply 2>/dev/null || true
          
          # Load env and start
          export $(cat .env | xargs 2>/dev/null) || true
          pm2 start npm --name autoapply -- start
          pm2 save
          
          echo "=== Deployment Complete ==="
          pm2 list
          ENDSCRIPT
          )
          
          # Replace placeholders
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//S3_BUCKET_PLACEHOLDER/$S3_BUCKET}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//AWS_REGION_PLACEHOLDER/$AWS_REGION}"
          
          # Send SSM command
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"$DEPLOY_SCRIPT\"]}" \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)
          
          echo "📋 SSM Command: $COMMAND_ID"
          echo "⏳ Waiting for deployment (up to 2 minutes)..."
          
          # Wait and check status
          for i in {1..12}; do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            
            echo "   Status: $STATUS"
            
            if [ "$STATUS" == "Success" ]; then
              echo "✅ Deployment successful!"
              break
            elif [ "$STATUS" == "Failed" ] || [ "$STATUS" == "TimedOut" ]; then
              echo "❌ Deployment failed!"
              # Get error output
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
          done

      - name: Get Application URL
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo ""
          echo "========================================"
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "========================================"
          echo ""
          echo "🌐 Application URL: http://$PUBLIC_IP:3000"
          echo "📍 EC2 Instance: $INSTANCE_ID"
          echo "📦 Commit: ${{ github.sha }}"
          echo ""
          echo "========================================"

  verify-deployment:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Verify App is Running
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo "Testing http://$PUBLIC_IP:3000..."
          
          # Wait a bit for app to start
          sleep 10
          
          # Test the endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$PUBLIC_IP:3000" --connect-timeout 10 || echo "000")
          
          if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "304" ]; then
            echo "✅ Application is live and responding!"
            echo "🌐 URL: http://$PUBLIC_IP:3000"
          else
            echo "⚠️ App returned HTTP $HTTP_CODE - may still be starting"
            echo "🌐 Try: http://$PUBLIC_IP:3000"
          fi
