name: Bootstrap EC2 (SSH → install SSM + Docker)

# Run this ONCE on a fresh EC2 instance.
# After it completes, all future deployments use SSM — SSH is no longer needed.
on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  bootstrap:
    name: Install SSM Agent + Docker via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. SSH into the VM and run the bootstrap script ──────────────────────
      - name: Bootstrap EC2 via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}  # e.g. ubuntu, ec2-user, admin
        run: |
          echo "📡 Connecting to $EC2_USER@$EC2_HOST via SSH..."

          # Write SSH key to temp file
          echo "$SSH_KEY" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

          # Copy bootstrap script to VM
          scp -i /tmp/ec2_key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              scripts/setup-ec2.sh \
              "$EC2_USER@$EC2_HOST:/tmp/setup-ec2.sh"

          # Run bootstrap script on VM
          ssh -i /tmp/ec2_key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$EC2_USER@$EC2_HOST" \
              "chmod +x /tmp/setup-ec2.sh && bash /tmp/setup-ec2.sh"

          # Clean up key
          rm -f /tmp/ec2_key.pem

      # ── 2. Verify SSM Agent is registered with AWS ───────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify SSM registration
        run: |
          echo "⏳ Waiting for instance to register with SSM (up to 60s)..."
          for i in {1..12}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")

            echo "  [${i}] SSM ping status: $STATUS"

            if [ "$STATUS" = "Online" ]; then
              echo ""
              echo "✅ Instance is Online in SSM!"
              break
            fi
            sleep 5
          done

          if [ "$STATUS" != "Online" ]; then
            echo "⚠️  Instance not yet Online in SSM — it may take a minute more."
            echo "   Check: AWS Console → Systems Manager → Fleet Manager"
            echo "   Common causes:"
            echo "   - EC2 instance role missing AmazonSSMManagedInstanceCore policy"
            echo "   - VPC has no internet access (SSM needs outbound HTTPS)"
          fi

      # ── 3. Smoke test: run a command via SSM ─────────────────────────────────
      - name: Smoke test via SSM
        run: |
          echo "🧪 Running smoke test via SSM (no SSH)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "AutoApply bootstrap smoke test" \
            --timeout-seconds 60 \
            --parameters 'commands=[
              "echo \"=== SSM Smoke Test ===\"",
              "echo \"SSM Agent: $(amazon-ssm-agent -version 2>/dev/null || systemctl is-active amazon-ssm-agent)\"",
              "echo \"Docker: $(docker --version)\"",
              "echo \"AWS CLI: $(aws --version)\"",
              "echo \"✅ SSM is working!\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for i in {1..12}; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  [${i}] $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo ""
              echo "=== OUTPUT ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" \
                --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Smoke test failed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
          done

      - name: Done
        run: |
          echo ""
          echo "================================================"
          echo "  ✅ EC2 Bootstrap Complete!"
          echo "================================================"
          echo ""
          echo "  Your VM now has:"
          echo "    ✅ SSM Agent (registered + online)"
          echo "    ✅ Docker"
          echo "    ✅ AWS CLI v2"
          echo ""
          echo "  You can now run: Deploy to EC2"
          echo "  No SSH access needed from this point on."
          echo ""
          echo "  Next: GitHub → Actions → Deploy to EC2 → Run workflow"
          echo "================================================"
